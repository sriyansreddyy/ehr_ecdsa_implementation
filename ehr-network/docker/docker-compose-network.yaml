networks:
  ehr_network:
    name: ehr_network
    external: true   # network is pre-created by startup script, not owned by this compose

services:

  # ============================================================
  # ORDERER
  # ============================================================

  orderer.example.com:
    image: hyperledger/fabric-orderer:latest
    environment:
      - FABRIC_LOGGING_SPEC=INFO
      - ORDERER_GENERAL_LISTENADDRESS=0.0.0.0
      - ORDERER_GENERAL_LISTENPORT=7050
      - ORDERER_GENERAL_LOCALMSPID=OrdererMSP
      - ORDERER_GENERAL_LOCALMSPDIR=/var/hyperledger/orderer/msp
      - ORDERER_GENERAL_TLS_ENABLED=true
      - ORDERER_GENERAL_TLS_PRIVATEKEY=/var/hyperledger/orderer/tls/server.key
      - ORDERER_GENERAL_TLS_CERTIFICATE=/var/hyperledger/orderer/tls/server.crt
      - ORDERER_GENERAL_TLS_ROOTCAS=[/var/hyperledger/orderer/tls/ca.crt]
      - ORDERER_GENERAL_CLUSTER_CLIENTCERTIFICATE=/var/hyperledger/orderer/tls/server.crt
      - ORDERER_GENERAL_CLUSTER_CLIENTPRIVATEKEY=/var/hyperledger/orderer/tls/server.key
      - ORDERER_GENERAL_CLUSTER_ROOTCAS=[/var/hyperledger/orderer/tls/ca.crt]
      - ORDERER_GENERAL_BOOTSTRAPMETHOD=none
      - ORDERER_CHANNELPARTICIPATION_ENABLED=true
      - ORDERER_ADMIN_TLS_ENABLED=true
      - ORDERER_ADMIN_TLS_CERTIFICATE=/var/hyperledger/orderer/tls/server.crt
      - ORDERER_ADMIN_TLS_PRIVATEKEY=/var/hyperledger/orderer/tls/server.key
      - ORDERER_ADMIN_TLS_ROOTCAS=[/var/hyperledger/orderer/tls/ca.crt]
      - ORDERER_ADMIN_TLS_CLIENTROOTCAS=[/var/hyperledger/orderer/tls/ca.crt]
      - ORDERER_ADMIN_LISTENADDRESS=0.0.0.0:7053
      - ORDERER_OPERATIONS_LISTENADDRESS=0.0.0.0:17050
    working_dir: /opt/gopath/src/github.com/hyperledger/fabric
    command: orderer
    volumes:
      - ../organizations/ordererOrganizations/example.com/orderers/orderer.example.com/msp:/var/hyperledger/orderer/msp
      - ../organizations/ordererOrganizations/example.com/orderers/orderer.example.com/tls:/var/hyperledger/orderer/tls
      - orderer.example.com:/var/hyperledger/production/orderer
      - ../configtx/core.yaml:/etc/hyperledger/fabric/core.yaml
    ports:
      - "7050:7050"   # gRPC
      - "7053:7053"   # OSNAdmin REST
      - "17050:17050" # operations
    networks:
      - ehr_network

  # ============================================================
  # HOSPITAL PEER 0 — Auth / Reception Peer
  # Roles: receptionist, hospitaladmin
  # ============================================================

  peer0.hospital.example.com:
    image: hyperledger/fabric-peer:latest
    environment:
      - CORE_VM_ENDPOINT=unix:///host/var/run/docker.sock
      - CORE_VM_DOCKER_HOSTCONFIG_NETWORKMODE=ehr_network
      - FABRIC_LOGGING_SPEC=INFO
      - CORE_PEER_TLS_ENABLED=true
      - CORE_PEER_PROFILE_ENABLED=false
      - CORE_PEER_TLS_CERT_FILE=/etc/hyperledger/fabric/tls/server.crt
      - CORE_PEER_TLS_KEY_FILE=/etc/hyperledger/fabric/tls/server.key
      - CORE_PEER_TLS_ROOTCERT_FILE=/etc/hyperledger/fabric/tls/ca.crt
      - CORE_PEER_ID=peer0.hospital.example.com
      - CORE_PEER_ADDRESS=peer0.hospital.example.com:7051
      - CORE_PEER_LISTENADDRESS=0.0.0.0:7051
      - CORE_PEER_CHAINCODEADDRESS=peer0.hospital.example.com:7052
      - CORE_PEER_CHAINCODELISTENADDRESS=0.0.0.0:7052
      - CORE_PEER_GOSSIP_BOOTSTRAP=peer0.hospital.example.com:7051
      - CORE_PEER_GOSSIP_EXTERNALENDPOINT=peer0.hospital.example.com:7051
      - CORE_PEER_LOCALMSPID=HospitalMSP
      - CORE_PEER_MSPCONFIGPATH=/etc/hyperledger/fabric/msp
      - CORE_OPERATIONS_LISTENADDRESS=0.0.0.0:17051
    volumes:
      - /var/run/docker.sock:/host/var/run/docker.sock
      - ../organizations/peerOrganizations/hospital.example.com/peers/peer0.hospital.example.com/msp:/etc/hyperledger/fabric/msp
      - ../organizations/peerOrganizations/hospital.example.com/peers/peer0.hospital.example.com/tls:/etc/hyperledger/fabric/tls
      - peer0.hospital.example.com:/var/hyperledger/production
      - ../configtx/core.yaml:/etc/hyperledger/fabric/core.yaml
    working_dir: /opt/gopath/src/github.com/hyperledger/fabric/peer
    command: peer node start
    ports:
      - "7051:7051"
      - "17051:17051"
    networks:
      - ehr_network

  # ============================================================
  # HOSPITAL PEER 1 — Doctor Peer
  # Roles: doctor, medrecordofficer
  # (Will move to VM2 after single-system testing)
  # ============================================================

  peer1.hospital.example.com:
    image: hyperledger/fabric-peer:latest
    environment:
      - CORE_VM_ENDPOINT=unix:///host/var/run/docker.sock
      - CORE_VM_DOCKER_HOSTCONFIG_NETWORKMODE=ehr_network
      - FABRIC_LOGGING_SPEC=INFO
      - CORE_PEER_TLS_ENABLED=true
      - CORE_PEER_PROFILE_ENABLED=false
      - CORE_PEER_TLS_CERT_FILE=/etc/hyperledger/fabric/tls/server.crt
      - CORE_PEER_TLS_KEY_FILE=/etc/hyperledger/fabric/tls/server.key
      - CORE_PEER_TLS_ROOTCERT_FILE=/etc/hyperledger/fabric/tls/ca.crt
      - CORE_PEER_ID=peer1.hospital.example.com
      - CORE_PEER_ADDRESS=peer1.hospital.example.com:9051
      - CORE_PEER_LISTENADDRESS=0.0.0.0:9051
      - CORE_PEER_CHAINCODEADDRESS=peer1.hospital.example.com:9052
      - CORE_PEER_CHAINCODELISTENADDRESS=0.0.0.0:9052
      # Gossip — bootstrap from peer0 so peers discover each other
      - CORE_PEER_GOSSIP_BOOTSTRAP=peer0.hospital.example.com:7051
      - CORE_PEER_GOSSIP_EXTERNALENDPOINT=peer1.hospital.example.com:9051
      - CORE_PEER_LOCALMSPID=HospitalMSP
      - CORE_PEER_MSPCONFIGPATH=/etc/hyperledger/fabric/msp
      - CORE_OPERATIONS_LISTENADDRESS=0.0.0.0:19051
    volumes:
      - /var/run/docker.sock:/host/var/run/docker.sock
      - ../organizations/peerOrganizations/hospital.example.com/peers/peer1.hospital.example.com/msp:/etc/hyperledger/fabric/msp
      - ../organizations/peerOrganizations/hospital.example.com/peers/peer1.hospital.example.com/tls:/etc/hyperledger/fabric/tls
      - peer1.hospital.example.com:/var/hyperledger/production
      - ../configtx/core.yaml:/etc/hyperledger/fabric/core.yaml 
    working_dir: /opt/gopath/src/github.com/hyperledger/fabric/peer
    command: peer node start
    ports:
      - "9051:9051"
      - "19051:19051"
    depends_on:
      - peer0.hospital.example.com
    networks:
      - ehr_network

  # ============================================================
  # HOSPITAL PEER 2 — Nurse + Pharmacist Peer
  # Roles: nurse, pharmacist
  # (Will move to VM3 after single-system testing)
  # ============================================================

  peer2.hospital.example.com:
    image: hyperledger/fabric-peer:latest
    environment:
      - CORE_VM_ENDPOINT=unix:///host/var/run/docker.sock
      - CORE_VM_DOCKER_HOSTCONFIG_NETWORKMODE=ehr_network
      - FABRIC_LOGGING_SPEC=INFO
      - CORE_PEER_TLS_ENABLED=true
      - CORE_PEER_PROFILE_ENABLED=false
      - CORE_PEER_TLS_CERT_FILE=/etc/hyperledger/fabric/tls/server.crt
      - CORE_PEER_TLS_KEY_FILE=/etc/hyperledger/fabric/tls/server.key
      - CORE_PEER_TLS_ROOTCERT_FILE=/etc/hyperledger/fabric/tls/ca.crt
      - CORE_PEER_ID=peer2.hospital.example.com
      - CORE_PEER_ADDRESS=peer2.hospital.example.com:10051
      - CORE_PEER_LISTENADDRESS=0.0.0.0:10051
      - CORE_PEER_CHAINCODEADDRESS=peer2.hospital.example.com:10052
      - CORE_PEER_CHAINCODELISTENADDRESS=0.0.0.0:10052
      # Gossip — bootstrap from peer0
      - CORE_PEER_GOSSIP_BOOTSTRAP=peer0.hospital.example.com:7051
      - CORE_PEER_GOSSIP_EXTERNALENDPOINT=peer2.hospital.example.com:10051
      - CORE_PEER_LOCALMSPID=HospitalMSP
      - CORE_PEER_MSPCONFIGPATH=/etc/hyperledger/fabric/msp
      - CORE_OPERATIONS_LISTENADDRESS=0.0.0.0:20051
    volumes:
      - /var/run/docker.sock:/host/var/run/docker.sock
      - ../organizations/peerOrganizations/hospital.example.com/peers/peer2.hospital.example.com/msp:/etc/hyperledger/fabric/msp
      - ../organizations/peerOrganizations/hospital.example.com/peers/peer2.hospital.example.com/tls:/etc/hyperledger/fabric/tls
      - peer2.hospital.example.com:/var/hyperledger/production
      - ../configtx/core.yaml:/etc/hyperledger/fabric/core.yaml
    working_dir: /opt/gopath/src/github.com/hyperledger/fabric/peer
    command: peer node start
    ports:
      - "10051:10051"
      - "20051:20051"
    depends_on:
      - peer0.hospital.example.com
    networks:
      - ehr_network

  # ============================================================
  # DIAGNOSTICS PEER — Lab Peer
  # Roles: labreceptionist, labtechnician, labsupervisor, radiologist
  # (Will move to VM4 after single-system testing)
  # ============================================================

  peer0.diagnostic.example.com:
    image: hyperledger/fabric-peer:latest
    environment:
      - CORE_VM_ENDPOINT=unix:///host/var/run/docker.sock
      - CORE_VM_DOCKER_HOSTCONFIG_NETWORKMODE=ehr_network
      - FABRIC_LOGGING_SPEC=INFO
      - CORE_PEER_TLS_ENABLED=true
      - CORE_PEER_PROFILE_ENABLED=false
      - CORE_PEER_TLS_CERT_FILE=/etc/hyperledger/fabric/tls/server.crt
      - CORE_PEER_TLS_KEY_FILE=/etc/hyperledger/fabric/tls/server.key
      - CORE_PEER_TLS_ROOTCERT_FILE=/etc/hyperledger/fabric/tls/ca.crt
      - CORE_PEER_ID=peer0.diagnostic.example.com
      - CORE_PEER_ADDRESS=peer0.diagnostic.example.com:8051
      - CORE_PEER_LISTENADDRESS=0.0.0.0:8051
      - CORE_PEER_CHAINCODEADDRESS=peer0.diagnostic.example.com:8052
      - CORE_PEER_CHAINCODELISTENADDRESS=0.0.0.0:8052
      - CORE_PEER_GOSSIP_BOOTSTRAP=peer0.diagnostic.example.com:8051
      - CORE_PEER_GOSSIP_EXTERNALENDPOINT=peer0.diagnostic.example.com:8051
      - CORE_PEER_LOCALMSPID=DiagnosticsMSP
      - CORE_PEER_MSPCONFIGPATH=/etc/hyperledger/fabric/msp
      - CORE_OPERATIONS_LISTENADDRESS=0.0.0.0:18051
    volumes:
      - /var/run/docker.sock:/host/var/run/docker.sock
      - ../organizations/peerOrganizations/diagnostic.example.com/peers/peer0.diagnostic.example.com/msp:/etc/hyperledger/fabric/msp
      - ../organizations/peerOrganizations/diagnostic.example.com/peers/peer0.diagnostic.example.com/tls:/etc/hyperledger/fabric/tls
      - peer0.diagnostic.example.com:/var/hyperledger/production
      - ../configtx/core.yaml:/etc/hyperledger/fabric/core.yaml 
    working_dir: /opt/gopath/src/github.com/hyperledger/fabric/peer
    command: peer node start
    ports:
      - "8051:8051"
      - "18051:18051"
    networks:
      - ehr_network

  # ============================================================
  # PROVIDER PEER — Insurance Peer
  # Roles: billingofficer, claimsauditor, insuranceofficer
  # (Will move to VM4 after single-system testing)
  # ============================================================

  peer0.provider.example.com:
    image: hyperledger/fabric-peer:latest
    environment:
      - CORE_VM_ENDPOINT=unix:///host/var/run/docker.sock
      - CORE_VM_DOCKER_HOSTCONFIG_NETWORKMODE=ehr_network
      - FABRIC_LOGGING_SPEC=INFO
      - CORE_PEER_TLS_ENABLED=true
      - CORE_PEER_PROFILE_ENABLED=false
      - CORE_PEER_TLS_CERT_FILE=/etc/hyperledger/fabric/tls/server.crt
      - CORE_PEER_TLS_KEY_FILE=/etc/hyperledger/fabric/tls/server.key
      - CORE_PEER_TLS_ROOTCERT_FILE=/etc/hyperledger/fabric/tls/ca.crt
      - CORE_PEER_ID=peer0.provider.example.com
      - CORE_PEER_ADDRESS=peer0.provider.example.com:11051
      - CORE_PEER_LISTENADDRESS=0.0.0.0:11051
      - CORE_PEER_CHAINCODEADDRESS=peer0.provider.example.com:11052
      - CORE_PEER_CHAINCODELISTENADDRESS=0.0.0.0:11052
      - CORE_PEER_GOSSIP_BOOTSTRAP=peer0.provider.example.com:11051
      - CORE_PEER_GOSSIP_EXTERNALENDPOINT=peer0.provider.example.com:11051
      - CORE_PEER_LOCALMSPID=ProviderMSP
      - CORE_PEER_MSPCONFIGPATH=/etc/hyperledger/fabric/msp
      - CORE_OPERATIONS_LISTENADDRESS=0.0.0.0:21051
    volumes:
      - /var/run/docker.sock:/host/var/run/docker.sock
      - ../organizations/peerOrganizations/provider.example.com/peers/peer0.provider.example.com/msp:/etc/hyperledger/fabric/msp
      - ../organizations/peerOrganizations/provider.example.com/peers/peer0.provider.example.com/tls:/etc/hyperledger/fabric/tls
      - peer0.provider.example.com:/var/hyperledger/production
      - ../configtx/core.yaml:/etc/hyperledger/fabric/core.yaml 
    working_dir: /opt/gopath/src/github.com/hyperledger/fabric/peer
    command: peer node start
    ports:
      - "11051:11051"
      - "21051:21051"
    networks:
      - ehr_network

  # ============================================================
  # IPFS NODE — Content-addressed storage for EHR + Visit JSON
  # API:     localhost:5001  (used by ipfs-service internally)
  # Gateway: localhost:8090  (read-only HTTP gateway)
  #
  # Why port 8090 not 8080?
  #   8080 is commonly used by other services. 8090 avoids conflicts.
  # ============================================================

  ipfs.ehr.local:
    image: ipfs/kubo:latest
    container_name: ipfs.ehr.local
    environment:
      - IPFS_PROFILE=server
      # These env vars are read by Kubo's start_ipfs entrypoint script
      - IPFS_PATH=/data/ipfs
    volumes:
      - ipfs_data:/data/ipfs
      - ipfs_export:/export
    ports:
      - "4001:4001"   # swarm
      - "5001:5001"   # API
      - "8090:8080"   # HTTP gateway
    networks:
      - ehr_network
    # Kubo entrypoint (start_ipfs) handles init automatically on first run.
    # We pass daemon flags as the command — no sh -c needed.
    # CORS and address config is applied via a post-start script or
    # ipfs-service connects directly; API is accessible on 5001 by default.
    command: ["daemon", "--migrate=true", "--enable-gc"]
    healthcheck:
      test: ["CMD", "ipfs", "id"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

volumes:
  orderer.example.com:
  peer0.hospital.example.com:
  peer1.hospital.example.com:
  peer2.hospital.example.com:
  peer0.diagnostic.example.com:
  peer0.provider.example.com:
  ipfs_data:
  ipfs_export:
  